name = "alchemical"
main = "src/worker.js"
compatibility_date = "2025-02-04"

[vars]
# Replace these placeholder values before deploying, or override them with
# `wrangler secret put` for sensitive production deployments.
TELEGRAM_BOT_TOKEN = "REPLACE_WITH_TELEGRAM_BOT_TOKEN"
ADMIN_TOKEN = "REPLACE_WITH_ADMIN_TOKEN"

[observability]
enabled = true

[[d1_databases]]
binding = "DB"
database_name = "jutsumoji"
database_id = "51604989-07b2-43bd-8bb6-68680d9622dc"

[[kv_namespaces]]
binding = "KV_BINDING"
id = "99f274107ed043dcbe27881f46ee17bc"

[[kv_namespaces]]
binding = "BOT_SESSIONS"
id = "b14b9bfdb25e42008596447e4d931472"
preview_id = "<ID_OF_PREVIEW_BOT_SESSIONS_KV_NAMESPACE_FOR_LOCAL_DEVELOPMENT>"

